<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المحاضر - نظام الحضور الذكي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0d0b18; /* خلفية داكنة مريحة للعين في القاعات */
            --card-bg: #161224;
            --primary-purple: #a64bf4; /* النيون البنفسجي المفضل */
            --text-light: #f8f9fa;
            --text-muted: #a0aec0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(166, 75, 244, 0.2);
            border: 1px solid rgba(166, 75, 244, 0.25);
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        h1 {
            color: var(--text-light);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 2rem;
        }
        .qr-wrapper {
            background: #ffffff; /* يجب أن تظل خلفية الـ QR بيضاء ليقرأه الموبايل بسهولة */
            padding: 1.5rem;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            margin-bottom: 1.5rem;
        }
        .footer-text {
            font-size: 0.9rem;
            color: var(--primary-purple);
            font-weight: bold;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>نظام تسجيل الحضور الذكي 🚀</h1>
    <p>وجه كاميرا الموبايل وافتح الرابط لتسجيل حضورك الفوري</p>
    
    <div class="qr-wrapper">
        <div id="qrcode"></div>
    </div>
    
    <div class="footer-text">● الـ QR Code نشط وموثق حالياً</div>
</div>

<script>
    // الرابط المباشر لصفحة الطالب الخاصة بك على GitHub Pages
    const STUDENT_PAGE_URL = "https://thomaswael1.github.io/attendance-/STUDENT.UI.html";
    
    // تجهيز حاوية الـ QR Code وحجمه
    const qrContainer = document.getElementById("qrcode");
    const qrcode = new QRCode(qrContainer, {
        width: 256,
        height: 256,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    // توليد الـ QR Code ليوجه مباشرة لصفحة الطالب بدون معاملات إضافية تعيق الإرسال
    qrcode.makeCode(STUDENT_PAGE_URL);
</script>
</body>
</html>
