<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حضور الطالب</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #f8f9fa;
            --primary-neon: #a64bf4;
            --text-color: #2b2d42;
            --success-color: #1b4332;
            --success-bg: #d8f3dc;
            --error-color: #721c24;
            --error-bg: #f8d7da;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(166, 75, 244, 0.12);
            border: 1px solid rgba(166, 75, 244, 0.15);
            width: 85%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #1a1a1a;
            margin-bottom: 1.5rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            margin: 8px 0 20px 0;
            display: inline-block;
            border: 1px solid #ced4da;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: #fff;
            color: #000;
            font-size: 1rem;
            text-align: center;
            transition: 0.3s;
        }
        input[type="text"]:focus {
            border-color: var(--primary-neon);
            outline: none;
            box-shadow: 0 0 8px rgba(166, 75, 244, 0.3);
        }
        button {
            background: linear-gradient(135deg, var(--primary-neon), #833ab4);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(166, 75, 244, 0.2);
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
