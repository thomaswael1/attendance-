<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة المحاضر - نظام الحضور الذكي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff; /* تم التغيير للأبيض */
            --card-bg: #f8f9fa; /* خلفية الكارت رمادي فاتح جداً */
            --primary-neon: #a64bf4;
            --text-color: #2b2d42; /* تم تغيير النص للون داكن ليظهر بوضوح */
            --accent-cyan: #00b4d8; /* تعديل الأزرق ليكون واضحاً على الخلفية البيضاء */
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(166, 75, 244, 0.15);
            border: 1px solid rgba(166, 75, 244, 0.2);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        h1 {
            color: #1a1a1a;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 5px rgba(166, 75, 244, 0.3);
        }
        p {
            font-size: 0.95rem;
            color: #6c757d;
            margin-bottom: 2rem;
        }
        .qr-wrapper {
            background: #fff;
            padding: 1.5rem;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
            border: 1px solid #eee;
        }
        #qrcode img {
            margin: 0 auto;
        }
        .timer-container {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-neon);
            margin-top: 10px;
        }
        .progress-bar-container {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 10px;
            height: 8px;
            margin-top: 15px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--primary-neon), var(--accent-cyan));
            transition: width 1s linear;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>نظام تسجيل الحضور الذكي</h1>
    <p>يرجى مسح الـ QR Code لتسجيل حضورك الفوري</p>
    
    <div class="qr-wrapper">
        <div id="qrcode"></div>
    </div>
    
    <div class="timer-container">
        يتغير الـ QR تلقائياً خلال: <span id="countdown">15</span> ثانية
    </div>
    <div class="progress-bar-container">
        <div id="progress" class="progress-bar"></div>
    </div>
</div>

<script>
    const SECRET_KEY = "MY_SUPER_SECRET_KEY_123"; 
    const STUDENT_PAGE_URL = "https://YOUR_GITHUB_USERNAME.github.io/YOUR_REPO_NAME/student.html";

    let timeLeft = 15;
    let qrContainer = document.getElementById("qrcode");
    let qrcode = new QRCode(qrContainer, { width: 256, height: 256 });

    function generateDynamicQR() {
        const timestamp = new Date().getTime();
        const token = CryptoJS.SHA256(timestamp + SECRET_KEY).toString(CryptoJS.enc.Hex);
        const finalUrl = `${STUDENT_PAGE_URL}?token=${token}&ts=${timestamp}`;
        qrcode.makeCode(finalUrl);
    }

    function startTimer() {
        generateDynamicQR();
        setInterval(() => {
            timeLeft--;
            document.getElementById("countdown").innerText = timeLeft;
            document.getElementById("progress").style.width = (timeLeft / 15) * 100 + "%";
            
            if (timeLeft <= 0) {
                timeLeft = 15;
                generateDynamicQR();
            }
        }, 1000);
    }

    window.onload = startTimer;
</script>
</body>
</html>
